name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check (libs)
        run: cargo fmt --manifest-path libs/luum_math/Cargo.toml -- --check
      - name: Format check (cli)
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build libraries
        run: cargo build -p luum-math -p cli --release

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./sdk
        run: npm install
      - name: Type check
        working-directory: ./sdk
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: ./sdk
        run: npm test
